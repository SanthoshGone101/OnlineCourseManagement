trigger:
- main

pool:
  name: AzureVMpool

steps:
# Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'

# Build frontend (force output path)
- script: |
    npm install
    npm run build -- --output-path=$(System.DefaultWorkingDirectory)/dist/online-course-app
  displayName: 'Build frontend'

# Debug: confirm dist folder exists
- powershell: |
    Write-Host "Listing dist folder contents..."
    Get-ChildItem -Recurse "$(System.DefaultWorkingDirectory)/dist"
  displayName: 'Debug dist folder'

# Upload build output to Azure Storage
- task: AzureCLI@2
  inputs:
    azureSubscription: 'OCM-Connection'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az storage blob upload-batch `
        --account-name ocmstoragefrontend `
        -d '$web' `
        -s "$(System.DefaultWorkingDirectory)/dist/online-course-app"
