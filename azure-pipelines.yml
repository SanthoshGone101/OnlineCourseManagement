trigger:
- main

pool:
  name: AzureVMpool

steps:
# Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node.js'

# Install Angular CLI globally (needed for ng build)
- script: |
    npm install -g @angular/cli
  displayName: 'Install Angular CLI'

# Build Angular app (from repo root)
- script: |
    cd $(System.DefaultWorkingDirectory)
    npm install
    ng build --output-path=dist/online-course-app
  displayName: 'Build Angular frontend'

# Debug: confirm dist folder exists
- powershell: |
    Write-Host "Listing dist folder contents..."
    Get-ChildItem -Recurse "$(System.DefaultWorkingDirectory)/dist"
  displayName: 'Debug dist folder'

# Upload build output to Azure Storage
- task: AzureCLI@2
  inputs:
    azureSubscription: 'OCM-Connection'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az storage blob upload-batch `
        --account-name ocmstoragefrontend `
        -d '$web' `
        -s "$(System.DefaultWorkingDirectory)/dist/online-course-app"
  displayName: 'Upload to Azure Storage'
