trigger:
  branches:
    include:
      - main
      - master

pool:
  name: AzureVMpool

steps:
# Install Node.js 20 (Angular requires >=20)
- task: UseNode@1
  inputs:
    version: '20.x'
  displayName: 'Install Node.js'

# Install dependencies
- script: |
    cd $(System.DefaultWorkingDirectory)
    npm ci
  displayName: 'Install dependencies'

# Run Angular build explicitly
- script: |
    cd $(System.DefaultWorkingDirectory)
    npx ng build --configuration production --verbose
  displayName: 'Run Angular build (verbose)'

# Debug: show working directory
- powershell: |
    Write-Host "Current working directory:"
    Get-Location
  displayName: 'Show working directory'

# Debug: list repo root contents
- powershell: |
    Write-Host "Contents of repo root:"
    Get-ChildItem "$(System.DefaultWorkingDirectory)"
  displayName: 'List repo root contents'

# Debug: list dist folder contents
- powershell: |
    Write-Host "Contents of dist folder:"
    Get-ChildItem -Recurse "$(System.DefaultWorkingDirectory)/dist"
  displayName: 'List dist folder contents'

# Debug: list dist/online-course-app contents
- powershell: |
    Write-Host "Contents of dist/online-course-app folder:"
    Get-ChildItem -Recurse "$(System.DefaultWorkingDirectory)/dist/online-course-app"
  displayName: 'List dist/online-course-app contents'

# Upload build output to Azure Storage
- task: AzureCLI@2
  inputs:
    azureSubscription: 'OCM-Connection'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      Write-Host "Uploading Angular build to Azure Storage..."
      az storage blob upload-batch `
        --account-name ocmstoragefrontend `
        -d '$web' `
        -s "$(System.DefaultWorkingDirectory)/dist/online-course-app" `
        --overwrite true
      Write-Host "Upload complete."
  displayName: 'Upload to Azure Storage'

# Debug: list contents of $web container after upload
- task: AzureCLI@2
  inputs:
    azureSubscription: 'OCM-Connection'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      Write-Host "Listing contents of $web container after upload..."
      az storage blob list `
        --account-name ocmstoragefrontend `
        -c '$web' `
        --output table
  displayName: 'List $web container contents after upload'
