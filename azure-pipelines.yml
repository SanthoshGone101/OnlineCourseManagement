trigger:
- main

pool:
  name: AzureVMpool

steps:
# Install Node.js (supported task, no deprecation warning)
- task: UseNode@1
  inputs:
    version: '20.x'   # Angular 17+ requires Node >=20
  displayName: 'Install Node.js'

# Install Angular CLI globally
- script: |
    npm install -g @angular/cli
  displayName: 'Install Angular CLI'

# Build Angular app (explicit ng build)
- script: |
    cd $(System.DefaultWorkingDirectory)
    npm install
    ng build --configuration production
  displayName: 'Build Angular frontend'

# Debug: show working directory
- powershell: |
    Write-Host "Current working directory:"
    Get-Location
  displayName: 'Show working directory'

# Debug: list repo root contents
- powershell: |
    Write-Host "Contents of repo root:"
    Get-ChildItem "$(System.DefaultWorkingDirectory)"
  displayName: 'List repo root contents'

# Debug: list dist folder contents
- powershell: |
    Write-Host "Contents of dist folder:"
    Get-ChildItem -Recurse "$(System.DefaultWorkingDirectory)/dist"
  displayName: 'List dist folder contents'

# Upload build output to Azure Storage
- task: AzureCLI@2
  inputs:
    azureSubscription: 'OCM-Connection'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az storage blob upload-batch `
        --account-name ocmstoragefrontend `
        -d '$web' `
        -s "$(System.DefaultWorkingDirectory)/dist/online-course-app"
  displayName: 'Upload to Azure Storage'
