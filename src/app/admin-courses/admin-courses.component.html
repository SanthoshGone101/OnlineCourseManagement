<div class="manage-courses-container">
  <h2 class="manage-courses-title">Manage Courses</h2>

  <div class="courses-content">
    <!-- Left: Add/Edit Course Form -->
    <div class="course-form">
      <h5 class="form-title">{{ isEditMode ? 'Edit Course' : 'Add New Course' }}</h5>
      <form (ngSubmit)="saveCourse()">
        <div class="mb-3">
          <label for="title" class="form-label">
            <i class="bi bi-book"></i> Course Title
          </label>
          <input [(ngModel)]="courseTitle" name="title" id="title" 
                 class="form-control" placeholder="Enter course title">
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">
            <i class="bi bi-text-paragraph"></i> Description
          </label>
          <textarea [(ngModel)]="courseDescription" name="description" id="description" 
                    class="form-control" rows="3" placeholder="Enter course description"></textarea>
        </div>
        <div class="mb-3">
          <label for="mediaPath" class="form-label">
            <i class="bi bi-image"></i> Media Path
          </label>
          <input [(ngModel)]="courseMediaPath" name="mediaPath" id="mediaPath" 
                 class="form-control" placeholder="Optional image path">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            {{ isEditMode ? 'Update Course' : 'Add Course' }}
          </button>
          <button *ngIf="isEditMode" type="button" class="btn btn-secondary ms-2" (click)="resetForm()">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Right: Courses Table -->
    <div class="course-table">
      <table class="table table-striped table-hover courses-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Image</th>
            <th style="width: 150px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let course of courses">
            <td>{{ course.title }}</td>
            <td>{{ course.description }}</td>
            <td>
              <img [src]="course.mediaPath" alt="Course Image" width="100" height="70" 
                   class="img-thumbnail rounded" *ngIf="course.mediaPath; else noImage">
              <ng-template #noImage>
                <span class="text-muted">No image</span>
              </ng-template>
            </td>
            <td>
              <button class="btn btn-sm btn-edit me-2" (click)="editCourse(course)">Edit</button>
              <button class="btn btn-sm btn-delete" (click)="deleteCourse(course.courseId)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
