<div class="dashboard-container" *ngIf="stats">
  <h2 class="dashboard-title">Admin Dashboard</h2>
  <p class="dashboard-intro">
    Overview of system activity — users, roles, courses, and enrollments.
  </p>

  <div class="stats-strip">
    <div class="stat-badge users">👥 Total Users - {{ stats.totalUsers }}</div>
    <div class="stat-badge students">🎓 Students - {{ stats.students }}</div>
    <div class="stat-badge admins">🛡️ Admins - {{ stats.admins }}</div>
    <div class="stat-badge courses">📚 Courses - {{ stats.totalCourses }}</div>
    <div class="stat-badge enrollments">📝 Enrollments - {{ stats.totalEnrollments }}</div>
  </div>
</div>

<div class="dashboard-image">
  <img src="assets/admin-working.jpg" alt="Admin at work">
</div>
