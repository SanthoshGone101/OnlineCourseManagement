<div class="register-container">
  <div class="auth-card">
    <h2 class="form-title">Register</h2>

    <form (ngSubmit)="register()" #registerForm="ngForm" class="register-form">
      <div class="form-group">
        <input id="name" [(ngModel)]="name" name="name" type="text" placeholder="Full Name" class="form-control" required />
      </div>

      <div class="form-group">
        <input id="email" [(ngModel)]="email" name="email" type="email" placeholder="Email" class="form-control" required />
      </div>

      <div class="form-group">
        <input id="password" [(ngModel)]="password" name="password" type="password" placeholder="Password" class="form-control" required />
      </div>

      <div class="form-group">
        <select id="role" [(ngModel)]="role" name="role" class="form-control">
          <option value="Student">Student</option>
          <option value="Admin">Admin</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <div class="login-link">
      <p>Already have an account?</p>
      <a class="btn btn-outline-primary" routerLink="/home">Login</a>
    </div>
    
  </div>
</div>
